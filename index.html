<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Titiksha's Food Roulette</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
background:linear-gradient(135deg,#f7f3ee,#fffaf4);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:480px;
background:white;
border-radius:30px;
padding:28px;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:25px;
line-height:1.5;
}

.roulette{
height:90px;
overflow:hidden;
border-radius:18px;
background:#fafafa;
border:1px solid #eee;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
}

#foodDisplay{
font-size:2rem;
font-weight:700;
}

button{
border:none;
cursor:pointer;
}

.spinBtn{
width:100%;
background:black;
color:white;
padding:15px;
border-radius:999px;
font-size:1rem;
margin-bottom:20px;
}

.addSection{
display:flex;
gap:8px;
margin-bottom:15px;
}

input{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:12px;
font-size:1rem;
}

.addBtn{
background:#111;
color:white;
padding:12px 16px;
border-radius:12px;
}

.foodList{
margin-top:10px;
}

.foodItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 12px;
background:#fafafa;
border-radius:12px;
margin-bottom:8px;
}

.removeBtn{
background:#ffefef;
padding:6px 10px;
border-radius:10px;
}

.result{
text-align:center;
margin:15px 0;
font-size:1.1rem;
}

.footer{
margin-top:20px;
text-align:center;
font-size:.9rem;
color:#999;
}
</style>
</head>

<body>

<div class="card">

<h1>🍽️ Titiksha's Food Roulette</h1>

<div class="subtitle">
Because deciding what to eat shouldn't be harder than JEE Advanced.
</div>

<div class="roulette">
<div id="foodDisplay">🍜 Maggi</div>
</div>

<button class="spinBtn" onclick="spinFood()">
🎯 Pick For Me
</button>

<div class="result" id="result">
One spin. One decision. Zero arguments.
</div>

<div class="addSection">
<input id="foodInput" placeholder="Add a new food">
<button class="addBtn" onclick="addFood()">Add</button>
</div>

<div class="foodList" id="foodList"></div>

<div class="footer">
Built for indecisive food emergencies.
</div>

</div>

<script>

let foods =
JSON.parse(localStorage.getItem("titikshaFoods")) || [
"🥣 Bhel",
"🥥 Idli",
"🥬 Bhindi",
"🍜 Chowmein",
"🍝 Bambino",
"🍜 Maggi",
"🍝 Pasta",
"🧀 Paneer",
"🤷 Kuch Bhi"
];

function saveFoods(){
localStorage.setItem(
"titikshaFoods",
JSON.stringify(foods)
);
}

function renderFoods(){

const container =
document.getElementById("foodList");

container.innerHTML="";

foods.forEach((food,index)=>{

const div=document.createElement("div");

div.className="foodItem";

div.innerHTML=`
<span>${food}</span>
<button class="removeBtn"
onclick="removeFood(${index})">
❌
</button>
`;

container.appendChild(div);

});

}

function addFood(){

const input =
document.getElementById("foodInput");

const value =
input.value.trim();

if(!value) return;

foods.push(value);

saveFoods();

renderFoods();

input.value="";

}

function removeFood(index){

foods.splice(index,1);

saveFoods();

renderFoods();

}

let spinning=false;

function spinFood(){

if(spinning) return;

spinning=true;

const display =
document.getElementById("foodDisplay");

const result =
document.getElementById("result");

result.innerHTML =
"Searching for the perfect choice...";

let speed=80;
let cycles=0;

const interval =
setInterval(()=>{

display.innerHTML =
foods[
Math.floor(
Math.random()*foods.length
)
];

cycles++;

if(cycles>35){

clearInterval(interval);

const finalFood =
foods[
Math.floor(
Math.random()*foods.length
)
];

display.innerHTML =
finalFood;

result.innerHTML =
"<b>Today's Pick</b>";

spinning=false;

}

},speed);

}

renderFoods();

</script>

</body>
</html>
